<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="login.css" />
    <title>Login</title>
  </head>
  <body>
    <div class="tela">
      <div class="lado-esquerdo">
        <div class="sistema">SISTEMA</div>

        <h1 class="titulo">PROJETO <strong>MArrOM</strong></h1>
        <p class="subtitulo"></p>

        <div class="login">
          <label for="input-login" class="input">
            Registro Profissional ou E-mail</label
          >

          <input
            type="text"
            id="input-login"
            class="resposta"
            placeholder="CRM / CRN ou e-mail"
          />
        </div>

        <div class="login">
          <label for="input-senha" class="input">Senha</label>
          <input
            type="password"
            id="input-senha"
            class="resposta"
            placeholder="••••••••"
          />
        </div>
        <button class="btn-entrar">Entrar</button>
      </div>

      <div class="lado-direito">
        <div class="card">
          <div class="texto">
            Desenvolvido pensando no acompanhamento de feridas de modo
            não-invasivo.
          </div>
        </div>

        <div class="textinho">Trabalho por: Mariah Cesar e Rômulo Lopes.</div>
      </div>
    </div>
  </body>
</html>
