<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="dashboard.css" />
    <title>Painel de Acompanhamento - Projeto Curativo</title>
  </head>
  <body>
    <div class="container-geral">
      <aside class="sidebar">
        <div class="logo-secao">
          <div class="sistema-tag">SISTEMA</div>
          <h2 class="titulo-mini">PROJETO <strong>CURATIVO</strong></h2>
        </div>

        <nav class="menu">
          <a href="dashboard.html" class="item-menu ativo">Pacientes</a>
          <a href="historico.html" class="item-menu">Histórico</a>
          <a href="config.html" class="item-menu">Configurações</a>
        </nav>

        <div class="rodape-sidebar">
          <p class="autores">Última sincronização: -</p>
        </div>
      </aside>

      <main class="principal">
        <header class="topo-dashboard">
          <h1>Monitoramento em Tempo Real</h1>
          <div class="badge-sensor">
            Sensor Único: <strong>Disponível</strong>
          </div>
        </header>

        <section class="grid-pacientes">
          <div class="card paciente-ativo">
            <div class="status-linha">● Monitorando agora</div>
            <h3>Toshiro Cururu</h3>
            <div class="indicadores">
              <div class="bloco-dado">
                <span>Temp.</span>
                <strong>36.8°C</strong>
              </div>
              <div class="bloco-dado">
                <span>Umidade</span>
                <strong>42%</strong>
              </div>
            </div>
            <button class="btn-vincular">Desvincular Sensor</button>
          </div>

          <div class="card">
            <div class="status-linha inativo">○ Sem sensor</div>
            <h3>Mariah Cesar</h3>
            <div class="indicadores">
              <div class="bloco-dado">
                <span>Temp.</span>
                <strong>--</strong>
              </div>
              <div class="bloco-dado">
                <span>Umidade</span>
                <strong>--</strong>
              </div>
            </div>
            <button class="btn-vincular principal">Vincular Sensor</button>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
