<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="dashboard.css" />
    <title>Configurações - Projeto Curativo</title>
  </head>
  <body>
    <div class="container-geral">
      <aside class="sidebar">
        <div class="logo-secao">
          <div class="sistema-tag">SISTEMA</div>
          <h2 class="titulo-mini">PROJETO <strong>CURATIVO</strong></h2>
        </div>
        <nav class="menu">
          <a href="dashboard.html" class="item-menu">Pacientes</a>
          <a href="historico.html" class="item-menu">Histórico</a>
          <a href="config.html" class="item-menu ativo">Configurações</a>
        </nav>
        <div class="rodape-sidebar">
          <p class="rodape-texto">Última sincronização: -</p>
        </div>
      </aside>

      <main class="principal">
        <header class="topo-dashboard">
          <h1>Configurações do Sistema</h1>
        </header>

        <section class="grid-pacientes">
          <div class="card">
            <div class="status-linha">Parâmetros do Hardware</div>
            <h3 style="margin-bottom: 20px">Conexão ESP32</h3>

            <div style="margin-bottom: 15px">
              <label class="status-linha" style="font-size: 9px"
                >ID do Dispositivo</label
              >
              <input
                type="text"
                value="ESP32-UNIT-01"
                class="resposta"
                readonly
              />
            </div>

            <div style="margin-bottom: 15px">
              <label class="status-linha" style="font-size: 9px"
                >Intervalo MQTT (Segundos)</label
              >
              <input
                type="number"
                class="resposta"
                placeholder="60"
                class="input-config"
              />
            </div>

            <button class="btn-vincular principal">Salvar Hardware</button>
          </div>

          <div class="card">
            <div class="status-linha">Alertas Médicos</div>
            <h3 style="margin-bottom: 20px">Limites de Segurança</h3>

            <div style="margin-bottom: 15px">
              <label class="status-linha" style="font-size: 9px"
                >Limite de Febre Local (°C)</label
              >
              <input type="text" placeholder="38.5" class="resposta" />
            </div>

            <button class="btn-vincular principal">Atualizar Protocolo</button>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
